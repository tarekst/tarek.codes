<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="./css/style.css" rel="stylesheet" />
  </head>
  <body>
    <div class="container flex justify-center mx-auto">
      <div class="grid content-center h-screen grid-cols-1 gap-4">
        <div
          class="w-full max-w-sm bg-white border border-gray-200 rounded-lg shadow-md dark:bg-gray-800 dark:border-gray-700"
        >
          <div class="flex flex-col items-center p-10">
            <img
              class="w-24 h-24 mb-3 rounded-full shadow-2xl"
              src="./img/avatar.png"
              alt=""
            />
            <h5 class="mb-1 text-xl font-medium text-gray-900 dark:text-white">
              Tarek St.
            </h5>
            <span class="text-sm text-gray-500 dark:text-gray-400"
              >Software Developer</span
            >
          </div>
          <div class="flex flex-row items-center p-10 border-t border-gray-700 text-slate-400">
            <img src="./img/github.png" width="25px" height="25px" alt="GitHub"></img>
            <a href="https://github.com/tarekst" class="ml-3"> @tarek.st</a>
          </div>
        </div>
      </div>
    </div>
    <div class="flex justify-between p-4 text-sm text-slate-700">
      <p>© 2023 Tarek St.</p>
    </div>
  </body>
</html>
