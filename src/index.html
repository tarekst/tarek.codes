<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="./css/style.css" rel="stylesheet" />
  </head>
  <body>
    <div class="container mx-auto flex justify-center">
      <div class="grid grid-cols-1 gap-4 h-screen content-center">
        <div
          class="w-full max-w-sm bg-white rounded-lg border border-gray-200 shadow-md dark:bg-gray-800 dark:border-gray-700"
        >
          <div class="flex flex-col items-center p-10">
            <img
              class="mb-3 w-24 h-24 rounded-full shadow-2xl"
              src="./img/avatar.png"
              alt=""
            />
            <h5 class="mb-1 text-xl font-medium text-gray-900 dark:text-white">
              Tarek St.
            </h5>
            <span class="text-sm text-gray-500 dark:text-gray-400"
              >Software Developer</span
            >
          </div>
          <div class="flex flex-row items-center p-10 border-t border-gray-700 text-slate-400">
            <img src="./img/github.png" width="25px" height="25px" alt="GitHub"></img>
            <a href="https://github.com/tarekst" class="ml-3"> @tarek.st</a>
          </div>
        </div>
      </div>
    </div>
    <div class="flex justify-between text-sm text-slate-700 p-4">
      <p>© 2022 Tarek St.</p>
      <a
        href="https://www.flaticon.com/free-icons/programmer"
        title="programmer icons"
        >Programmer icons created by Freepik - Flaticon</a
      >
    </div>
  </body>
</html>
